{% extends "base.html" %}
{% block title %}Entrar — CIPA Eleitoral{% endblock %}
{% block content %}
<section class="mx-auto max-w-md rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
  <h1 class="text-2xl font-bold">Acesso administrativo</h1>
  <p class="mt-2 text-sm text-slate-600">Use o e-mail confirmado associado ao seu convite.</p>
  <form method="post" action="{% url 'account_login' %}" class="mt-6 space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    {% if redirect_field_value %}<input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">{% endif %}
    <button type="submit" class="w-full bg-brand-700 text-white">Entrar</button>
  </form>
  <p class="mt-4 text-sm"><a href="{% url 'account_reset_password' %}">Esqueci minha senha</a></p>
</section>
{% endblock %}
