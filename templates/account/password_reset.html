{% extends "base.html" %}
{% block title %}Recuperar senha — CIPA Eleitoral{% endblock %}
{% block content %}
<section class="mx-auto max-w-md rounded-xl border bg-white p-6">
  <h1 class="text-2xl font-bold">Recuperar senha</h1>
  <p class="mt-2 text-sm text-slate-600">A resposta será a mesma exista ou não uma conta, para proteger sua privacidade.</p>
  <form method="post" class="mt-6 space-y-4">{% csrf_token %}{{ form.as_p }}<button class="w-full bg-brand-700 text-white">Enviar instruções</button></form>
</section>
{% endblock %}
