services:
  postgres:
    image: postgres:17.10-bookworm
    environment:
      POSTGRES_DB: cipa
      POSTGRES_USER: cipa_owner
      POSTGRES_PASSWORD: ${POSTGRES_OWNER_PASSWORD:?configure POSTGRES_OWNER_PASSWORD}
      CIPA_APP_PASSWORD: ${CIPA_APP_PASSWORD:?configure CIPA_APP_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sh:/docker-entrypoint-initdb.d/10-app-role.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cipa_owner -d cipa"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.8.0-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cipa_app:${CIPA_APP_PASSWORD:?configure CIPA_APP_PASSWORD}@postgres:5432/cipa
      DATABASE_MIGRATION_URL: postgresql://cipa_owner:${POSTGRES_OWNER_PASSWORD:?configure POSTGRES_OWNER_PASSWORD}@postgres:5432/cipa
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live/', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  worker:
    build: .
    command: ["celery", "-A", "config", "worker", "--loglevel=INFO"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cipa_app:${CIPA_APP_PASSWORD:?configure CIPA_APP_PASSWORD}@postgres:5432/cipa
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout=3 | grep -q pong"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
