name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17.10-bookworm
        env:
          POSTGRES_DB: cipa
          POSTGRES_USER: cipa_owner
          POSTGRES_PASSWORD: ci-owner-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cipa_owner -d cipa"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:8.8.0-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-only-secret-key-with-more-than-fifty-characters-change-me
      DATABASE_URL: postgresql://cipa_owner:ci-owner-password@localhost:5432/cipa
      REDIS_URL: redis://localhost:6379/0
      CIPA_APP_PASSWORD: ci-app-password
      MFA_ENCRYPTION_KEYS: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.14"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
      - run: pip install uv==0.11.15
      - run: uv sync --frozen --all-groups --all-extras
      - run: corepack enable && pnpm install --frozen-lockfile && pnpm build
      - name: Create restricted application role
        env:
          PGPASSWORD: ci-owner-password
        run: >-
          psql -h localhost -U cipa_owner -d cipa -v ON_ERROR_STOP=1
          -c "CREATE ROLE cipa_app LOGIN PASSWORD 'ci-app-password'
          NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS"
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy apps config
      - run: uv run python manage.py makemigrations --check --dry-run
      - run: uv run python manage.py migrate
      - run: uv run pytest -m "not e2e"
      - run: uv run python manage.py check --deploy --settings=config.settings.production
      - run: uv run bandit -c pyproject.toml -r apps config
      - run: uv run pip-audit .
